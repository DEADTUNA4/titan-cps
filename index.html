<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titan Clicker Pro | Official</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0f0f;
            --card: #1e1e1e;
            --accent: #3498db;
            --text: #ffffff;
            --gold: #f1c40f;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- NAVIGATION --- */
        nav {
            width: 100%;
            max-width: 500px;
            padding: 40px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }

        .logo { font-size: 24px; font-weight: 900; letter-spacing: -1px; }
        .logo span { color: var(--accent); }

        /* --- STATS CARD --- */
        .stats-card {
            background: var(--card);
            width: 85%;
            max-width: 400px;
            border-radius: 30px;
            padding: 30px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .stat-val { font-size: 48px; font-weight: 800; margin: 0; }
        .stat-label { font-size: 12px; font-weight: 700; opacity: 0.6; margin-top: 5px; }

        /* --- THE CIRCLE BUTTON --- */
        .click-area {
            margin: 60px 0;
            position: relative;
        }

        #clickBtn {
            width: 320px;
            height: 320px;
            border-radius: 50%;
            background: #2b2b2b;
            border: 8px solid #333;
            color: white;
            font-size: 28px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.1s ease;
            outline: none;
            box-shadow: 0 0 50px rgba(52, 152, 219, 0.1);
        }

        #clickBtn:active {
            transform: scale(0.96);
            background: #3b3b3b;
            border-color: var(--accent);
        }

        #clickBtn.active {
            border-color: var(--accent);
            box-shadow: 0 0 40px rgba(52, 152, 219, 0.4);
        }

        /* --- DOWNLOAD SECTION --- */
        .download-btn {
            background: #e74c3c;
            color: white;
            text-decoration: none;
            padding: 18px 40px;
            border-radius: 15px;
            font-weight: 700;
            font-size: 18px;
            transition: 0.3s;
            margin-bottom: 50px;
        }

        .download-btn:hover {
            background: #c0392b;
            transform: translateY(-3px);
        }

        .record { color: var(--gold); font-weight: 800; margin-bottom: 20px; }

    </style>
</head>
<body>

    <nav>
        <div class="logo">TITAN<span>CLICKER</span></div>
        <div id="highScore" class="record">BEST: 0.0 CPS</div>
    </nav>

    <div class="stats-card">
        <div>
            <p id="cps" class="stat-val">0.0</p>
            <p class="stat-label">LIVE CPS</p>
        </div>
        <div>
            <p id="clicks" class="stat-val">0</p>
            <p class="stat-label">CLICKS</p>
        </div>
    </div>

    <div class="click-area">
        <button id="clickBtn">TAP TO START</button>
    </div>

    <a href="TitanClickerPro.exe" class="download-btn" download>DOWNLOAD PRO (17.9MB) (.EXE)</a>

    <script>
        let clicks = 0;
        let startTime = null;
        let testRunning = false;
        let highScore = localStorage.getItem('titan_high_score') || 0;
        
        const btn = document.getElementById('clickBtn');
        const cpsDisplay = document.getElementById('cps');
        const clicksDisplay = document.getElementById('clicks');
        const highScoreDisplay = document.getElementById('highScore');

        highScoreDisplay.innerText = `BEST: ${highScore} CPS`;

        btn.addEventListener('mousedown', () => {
            if (!testRunning) {
                startTest();
            }
            registerClick();
        });

        function startTest() {
            testRunning = true;
            clicks = 0;
            startTime = Date.now();
            btn.innerText = "SPAM!";
            btn.classList.add('active');
            updateLoop();
        }

        function registerClick() {
            if (testRunning) {
                clicks++;
                clicksDisplay.innerText = clicks;
            }
        }

        function updateLoop() {
            if (testRunning) {
                let elapsed = (Date.now() - startTime) / 1000;
                
                if (elapsed > 0) {
                    let currentCps = (clicks / elapsed).toFixed(1);
                    cpsDisplay.innerText = currentCps;
                }

                if (elapsed >= 5) { // 5 second test
                    endTest();
                } else {
                    requestAnimationFrame(updateLoop);
                }
            }
        }

        function endTest() {
            testRunning = false;
            btn.innerText = "DONE!";
            btn.classList.remove('active');
            
            let finalCps = (clicks / 5).toFixed(2);
            cpsDisplay.innerText = finalCps;

            if (parseFloat(finalCps) > parseFloat(highScore)) {
                highScore = finalCps;
                localStorage.setItem('titan_high_score', highScore);
                highScoreDisplay.innerText = `BEST: ${highScore} CPS`;
                alert("NEW RECORD: " + finalCps + " CPS!");
            }

            setTimeout(resetTest, 2000);
        }

        function resetTest() {
            clicks = 0;
            cpsDisplay.innerText = "0.0";
            clicksDisplay.innerText = "0";
            btn.innerText = "TAP TO START";
        }
    </script>
</body>
</html>
